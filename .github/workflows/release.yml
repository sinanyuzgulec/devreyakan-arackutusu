name: Release and Build Multi-Platform Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux Packages (.deb & .AppImage)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 wget
          pip install -r requirements.txt
          chmod +x build_deb.sh build_appimage.sh
          ./build_deb.sh
          ./build_appimage.sh
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            *.deb
            *.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows Binary (.exe)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --noconfirm app.spec
      - uses: softprops/action-gh-release@v1
        with:
          files: dist/devreyakan-arackutusu.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

