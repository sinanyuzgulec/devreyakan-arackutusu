name: Release and Build Multi-Platform Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  build-all:
    name: Build All Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 wget
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Make Build Scripts Executable
        run: |
          chmod +x build_deb.sh
          chmod +x build_appimage.sh

      - name: Build DEB Package
        run: ./build_deb.sh

      - name: Build AppImage Package
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          ARCH=x86_64 ./squashfs-root/AppRun AppDir devreyakan-arackutusu_${GITHUB_REF_NAME}-x86_64.AppImage || true

      - name: Build Executable with PyInstaller
        run: |
          pyinstaller app.spec

      - name: Create Single Unified Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.deb
            *.AppImage
            dist/devreyakan-arackutusu.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

